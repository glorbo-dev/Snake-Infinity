<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Snake Infinity</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #2b2b2b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            touch-action: none;
            overscroll-behavior: none;
        }

        #game-container {
            position: relative; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #333;
            padding: clamp(20px, 5vw, 40px);
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            max-width: 95vw;
            max-height: 95vh;
            min-width: min(95vw, 360px);
            box-sizing: border-box;
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            visibility: hidden; 
        }

        .score-box {
            background-color: #444;
            padding: 10px 15px;
            border-radius: 5px;
            border: 2px solid #555;
        }

        #canvas-wrapper {
            display: flex; 
            justify-content: center;
            align-items: center;
            width: 800px;
            max-width: 100%;
            max-height: calc(95vh - 160px);
            background-color: #1a1a1a;
            border: clamp(4px, 1vw, 8px) solid #787878;
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            overflow: hidden;
            box-sizing: border-box;
            touch-action: none;
        }

        canvas {
            background-color: transparent;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .action-btn {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 900;
            cursor: pointer;
            color: white;
            border-radius: 8px;
            box-shadow: inset 0px 4px 0px rgba(255,255,255,0.4), 0 4px 6px rgba(0,0,0,0.2);
            text-transform: uppercase;
            transition: transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .green-btn {
            background-color: #00ff00;
            border: 6px solid #228b22;
        }

        .overlay-screen {
            position: absolute;
            inset: 0; 
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        #start-screen {
            background-color: #ffffff;
            justify-content: center;
        }

        #start-screen h1 {
            margin-top: 0;
            font-size: clamp(3rem, 10vw, 4.5rem);
            color: #000000;
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-align: center;
        }

        #start-btn, #settings-btn, #gamemodes-btn {
            font-size: clamp(2rem, 6vw, 3rem);
            padding: 10px;
            margin-bottom: 20px;
        }
        
        #version-text {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 1.1rem;
            color: #888888;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Reusable styles for settings and gamemodes */
        #settings-screen, #gamemodes-screen {
            background-color: #ffffff;
        }

        .screen-top {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
        }

        .back-btn {
            font-size: 1.5rem;
            padding: 8px 20px;
            width: auto;
            max-width: none;
        }

        .screen-center {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding-bottom: 40px;
            width: 100%;
        }

        .menu-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #00ff00;
            border: 6px solid #228b22;
            border-radius: 8px;
            width: 100%;
            max-width: 330px;
            margin-bottom: 25px;
            padding: 15px 20px;
            box-shadow: inset 0px 4px 0px rgba(255,255,255,0.4), 0 4px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
            gap: 10px;
        }

        .row-label {
            color: white;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: bold;
        }

        .green-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-color: #228b22;
            color: white;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: bold;
            border: 2px solid #00ff00;
            border-radius: 5px;
            padding: 5px 30px 5px 10px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 15px auto;
        }

        /* Gamemodes Checkbox Styling */
        .gamemode-btn {
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        
        .gamemode-btn:active {
            transform: scale(0.98);
        }

        .checkbox {
            width: 32px;
            height: 32px;
            background-color: #228b22;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0px 2px 5px rgba(0,0,0,0.2);
        }

        .checkmark {
            display: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1;
        }

        .gamemode-btn.active .checkmark {
            display: block;
        }

        #game-over-screen {
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
        }

        #game-over-screen h1 {
            margin-top: 0;
            font-size: clamp(2.5rem, 8vw, 3rem);
            color: #ff4c4c;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            text-align: center;
        }

        #restart-btn {
            font-size: 1.8rem;
            padding: 12px 15px;
            margin-bottom: 15px;
        }

        #main-menu-btn {
            font-size: 1.3rem;
            padding: 10px 15px;
            background-color: #ff9800;
            border: 6px solid #e65100;
        }

        #game-win-screen {
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
        }

        #game-win-screen h1 {
            margin-top: 0;
            font-size: clamp(3rem, 10vw, 4rem);
            color: #ffd700; 
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5);
            margin-bottom: 30px;
            z-index: 30; 
            text-align: center;
        }

        #win-restart-btn {
            font-size: 1.8rem;
            padding: 12px 15px;
            margin-bottom: 15px;
            z-index: 30;
        }

        #win-main-menu-btn {
            font-size: 1.3rem;
            padding: 10px 15px;
            background-color: #ff9800;
            border: 6px solid #e65100;
            z-index: 30;
        }

        #pause-screen {
            background-color: rgba(0, 0, 0, 0.75);
            justify-content: center;
        }

        #pause-screen h1 {
            margin-top: 0;
            font-size: clamp(3rem, 10vw, 4rem);
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-align: center;
        }

        #pause-screen p {
            color: #aaaaaa;
            font-size: 1.1rem;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        #resume-btn {
            font-size: 1.8rem;
            padding: 12px 15px;
            margin-bottom: 15px;
        }

        #pause-main-menu-btn {
            font-size: 1.3rem;
            padding: 10px 15px;
            background-color: #ff9800;
            border: 6px solid #e65100;
        }

        #confettiCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 25; 
            display: none;
        }

        /* ── Controller Cursor ── */
        #controller-cursor {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            border: 2.5px solid rgba(0, 0, 0, 0.18);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.08), 0 3px 10px rgba(0,0,0,0.35);
            pointer-events: none;
            z-index: 200;
            transform: translate(-50%, -50%);
            display: none;
        }

        /* Controller connected badge */
        #controller-badge {
            position: absolute;
            bottom: 12px;
            right: 14px;
            background: rgba(0,0,0,0.55);
            color: #aaffaa;
            padding: 4px 10px 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: none;
            z-index: 300;
            pointer-events: none;
            gap: 5px;
            align-items: center;
        }
        #controller-badge.visible { display: flex; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Scoreboard -->
        <div id="scoreboard">
            <div class="score-box">Apples: <span id="score">0</span></div>
            <div class="score-box">Best: <span id="high-score">0</span></div>
        </div>

        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- 1. Start Menu -->
        <div id="start-screen" class="overlay-screen" style="display: flex;">
            <h1>Snake &infin;</h1>
            <button id="start-btn" class="action-btn green-btn">PLAY</button>
            <button id="gamemodes-btn" class="action-btn green-btn">GAMEMODES</button>
            <button id="settings-btn" class="action-btn green-btn">SETTINGS</button>
            <div id="version-text">Version 1.0</div>
        </div>

        <!-- 2. Settings Menu -->
        <div id="settings-screen" class="overlay-screen">
            <div class="screen-top">
                <button id="settings-back-btn" class="action-btn green-btn back-btn">BACK</button>
            </div>
            <div class="screen-center">
                <div class="menu-row">
                    <span class="row-label">SPEED</span>
                    <select id="speed-select" class="green-select">
                        <option value="Slow">SLOW</option>
                        <option value="Normal" selected>NORMAL</option>
                        <option value="Fast">FAST</option>
                    </select>
                </div>
                <div class="menu-row">
                    <span class="row-label">MAP SIZE</span>
                    <select id="map-select" class="green-select">
                        <option value="Small">SMALL</option>
                        <option value="Normal" selected>NORMAL</option>
                        <option value="Big">BIG</option>
                    </select>
                </div>
                <div class="menu-row">
                    <span class="row-label">APPLES</span>
                    <select id="apples-select" class="green-select">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 3. Gamemodes Menu -->
        <div id="gamemodes-screen" class="overlay-screen">
            <div class="screen-top">
                <button id="gamemodes-back-btn" class="action-btn green-btn back-btn">BACK</button>
            </div>
            <div class="screen-center">
                <div class="menu-row gamemode-btn active" data-mode="Normal">
                    <span class="row-label">Normal</span>
                    <div class="checkbox"><span class="checkmark">&#10004;</span></div>
                </div>
                <div class="menu-row gamemode-btn" data-mode="AllApples">
                    <span class="row-label" style="font-size: 1.3rem;">All Tiles are Apples</span>
                    <div class="checkbox"><span class="checkmark">&#10004;</span></div>
                </div>
            </div>
        </div>

        <!-- 4. Game Over Menu -->
        <div id="game-over-screen" class="overlay-screen">
            <h1>Try again.</h1>
            <button id="restart-btn" class="action-btn green-btn">Play Again</button>
            <button id="main-menu-btn" class="action-btn">Return to main menu</button>
        </div>

        <!-- 5. Game Win Menu -->
        <div id="game-win-screen" class="overlay-screen">
            <h1>You Win!</h1>
            <button id="win-restart-btn" class="action-btn green-btn">Play Again</button>
            <button id="win-main-menu-btn" class="action-btn">Return to main menu</button>
        </div>
        
        <!-- 6. Pause Screen -->
        <div id="pause-screen" class="overlay-screen">
            <h1>PAUSED</h1>
            <p>Press ESC to resume</p>
            <button id="resume-btn" class="action-btn green-btn">RESUME</button>
            <button id="pause-main-menu-btn" class="action-btn">Return to main menu</button>
        </div>

        <!-- Confetti Canvas overlay layer -->
        <canvas id="confettiCanvas"></canvas>

        <!-- Controller cursor (shown only on menu screens) -->
        <div id="controller-cursor"></div>

        <!-- Controller badge -->
        <div id="controller-badge">🎮 Controller</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const scoreboard = document.getElementById('scoreboard');
        
        // Menu Elements
        const startScreen = document.getElementById('start-screen');
        const settingsScreen = document.getElementById('settings-screen');
        const gamemodesScreen = document.getElementById('gamemodes-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const winScreen = document.getElementById('game-win-screen');
        const pauseScreen = document.getElementById('pause-screen');
        
        // Buttons
        const startBtn = document.getElementById('start-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const gamemodesBtn = document.getElementById('gamemodes-btn');
        const settingsBackBtn = document.getElementById('settings-back-btn');
        const gamemodesBackBtn = document.getElementById('gamemodes-back-btn');
        const restartBtn = document.getElementById('restart-btn');
        const mainMenuBtn = document.getElementById('main-menu-btn');
        const winRestartBtn = document.getElementById('win-restart-btn');
        const winMainMenuBtn = document.getElementById('win-main-menu-btn');
        const resumeBtn = document.getElementById('resume-btn');
        const pauseMainMenuBtn = document.getElementById('pause-main-menu-btn');
        
        // Gamemode selection rows
        const gamemodeRows = document.querySelectorAll('.gamemode-btn');

        // Configuration Nodes
        const speedSelect = document.getElementById('speed-select');
        const mapSelect = document.getElementById('map-select');
        const applesSelect = document.getElementById('apples-select');

        // Game Configuration Variables
        let COLS = 17;
        let ROWS = 15;
        const TILE_SIZE = 30; 
        let TICK_RATE = 130; 

        // Game State Variables
        let snake =[];
        let previousSnake =[]; 
        let apples =[]; 
        let dx = 0; 
        let dy = 0;
        let directionQueue =[]; 
        let score = 0;
        let currentGamemode = 'Normal';
        
        let animationFrameId;
        let lastTickTime = 0;
        let isPaused = false;

        // Confetti variables
        let confetti =[];
        let confettiAnimationFrame;

        // Custom Sounds & Texture 
        const deathSound = new Audio('https://files.catbox.moe/posk3c.mp3');
        deathSound.preload = 'auto'; 
        
        const eatSound = new Audio('https://files.catbox.moe/a01mh9.mp3');
        eatSound.preload = 'auto';

        const winSound = new Audio('https://files.catbox.moe/awknot.mp3');
        winSound.preload = 'auto';

        const moveSound = new Audio('https://files.catbox.moe/a7zbmf.mp3');
        moveSound.preload = 'auto';

        const appleImg = new Image();
        appleImg.src = 'https://i.postimg.cc/68MD7tyQ/b6169439-332e-4c16-9d95-76a8652bbdf6-removalai-preview.png';

        appleImg.onload = () => {
            if (dx === 0 && dy === 0 && snake.length > 0 && gameOverScreen.style.display !== 'flex' && winScreen.style.display !== 'flex') {
                renderStaticFrame();
            }
        };

        // --- Core Application Functions ---

        function prepareBoard(isStartingPlay = false) {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (confettiAnimationFrame) cancelAnimationFrame(confettiAnimationFrame);
            
            // Toggle scoreboard visibility
            scoreboard.style.visibility = isStartingPlay ? 'visible' : 'hidden';

            // 1. Apply Chosen Settings
            const speedMap = { 'Slow': 260, 'Normal': 130, 'Fast': 65 };
            const mapMap = {
                'Small': { c: 9, r: 10 },
                'Normal': { c: 17, r: 15 },
                'Big': { c: 30, r: 30 }
            };
            
            TICK_RATE = speedMap[speedSelect.value];
            COLS = mapMap[mapSelect.value].c;
            ROWS = mapMap[mapSelect.value].r;
            
            canvas.width = COLS * TILE_SIZE;
            canvas.height = ROWS * TILE_SIZE;

            // Dynamically set our wrappers Aspect-Ratio to perfect proportions 
            document.getElementById('canvas-wrapper').style.aspectRatio = `${COLS} / ${ROWS}`;

            // 2. Initialize Logic Defaults
            let startX = Math.floor(COLS / 2);
            let startY = Math.floor(ROWS / 2);
            if (startX < 3) startX = 3; 

            snake =[
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            previousSnake = JSON.parse(JSON.stringify(snake));
            
            dx = 0; 
            dy = 0; 
            directionQueue =[];
            score = 0;
            
            updateScoreDisplay();
            
            // 3. Initialize Apples safely depending on Gamemode
            apples =[];
            if (currentGamemode === 'AllApples') {
                // Fill all empty tiles with apples
                for (let x = 0; x < COLS; x++) {
                    for (let y = 0; y < ROWS; y++) {
                        let onSnake = snake.some(part => part.x === x && part.y === y);
                        if (!onSnake) {
                            apples.push({ x: x, y: y });
                        }
                    }
                }
            } else {
                // Normal mode
                const numApples = parseInt(applesSelect.value) || 1;
                for (let i = 0; i < numApples; i++) {
                    let newA = createApple(i === 0);
                    if (newA) apples.push(newA); 
                }
            }
            
            renderStaticFrame();
        }

        function updateScoreDisplay() {
            scoreElement.innerText = score;
            const applesVal = applesSelect.value;
            // Includes settings AND gamemode in the key
            const key = `snakeHighScore_${speedSelect.value}_${mapSelect.value}_${applesVal}_${currentGamemode}`;
            let highScore = localStorage.getItem(key) || 0;
            highScoreElement.innerText = highScore;
        }

        function pauseGame() {
            isPaused = true;
            pauseScreen.style.display = 'flex';
            renderStaticFrame();
        }

        function resumeGame() {
            isPaused = false;
            pauseScreen.style.display = 'none';
            lastTickTime = performance.now();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function initPlay() {
            // --- AUDIO UNLOCK WORKAROUND ---
            const unlockAudio = (audioObj) => {
                audioObj.play().then(() => {
                    audioObj.pause();
                    audioObj.currentTime = 0;
                }).catch(e => console.log("Audio unlock issue:", e));
            };
            
            unlockAudio(deathSound);
            unlockAudio(eatSound);
            unlockAudio(winSound);
            unlockAudio(moveSound);
            // -------------------------------

            startScreen.style.display = 'none';
            settingsScreen.style.display = 'none';
            gamemodesScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            winScreen.style.display = 'none';
            pauseScreen.style.display = 'none';
            document.getElementById('confettiCanvas').style.display = 'none';
            isPaused = false;
            
            prepareBoard(true); 
            
            lastTickTime = performance.now();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function gameLoop(currentTime) {
            if (gameOverScreen.style.display === 'flex' || winScreen.style.display === 'flex') return;
            if (isPaused) return;

            animationFrameId = requestAnimationFrame(gameLoop);

            if (dx === 0 && dy === 0) {
                renderStaticFrame();
                return; 
            }

            let deltaTime = currentTime - lastTickTime;

            if (deltaTime >= TICK_RATE) {
                let ticks = Math.floor(deltaTime / TICK_RATE);
                if (ticks > 5) ticks = 5; 

                lastTickTime += ticks * TICK_RATE;
                
                for(let i = 0; i < ticks; i++) {
                    updateLogic();
                    if (gameOverScreen.style.display === 'flex' || winScreen.style.display === 'flex') {
                        renderStaticFrame();
                        return; 
                    }
                }
                deltaTime = currentTime - lastTickTime;
            }

            let progress = Math.min(deltaTime / TICK_RATE, 1);

            clearCanvas();
            drawGrid();
            drawApples();
            drawSnakeInterpolated(progress);
        }

        function updateLogic() {
            let nextDx = dx;
            let nextDy = dy;

            if (directionQueue.length > 0) {
                const nextDir = directionQueue.shift();
                nextDx = nextDir.dx;
                nextDy = nextDir.dy;
            }

            const head = { x: snake[0].x + nextDx, y: snake[0].y + nextDy };

            const hitLeftWall = head.x < 0;
            const hitRightWall = head.x >= COLS;
            const hitTopWall = head.y < 0;
            const hitBottomWall = head.y >= ROWS;

            let hitSelf = false;
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    if (i === snake.length - 1) {
                        let appleCollision = apples.some(a => head.x === a.x && head.y === a.y);
                        if (!appleCollision) continue; 
                    }
                    hitSelf = true;
                    break;
                }
            }

            if (hitLeftWall || hitRightWall || hitTopWall || hitBottomWall || hitSelf) {
                // Play custom sound on death
                deathSound.currentTime = 0; 
                deathSound.play().catch(e => console.log("Audio play prevented:", e));
                
                gameOverScreen.style.display = 'flex';
                return; 
            }

            dx = nextDx;
            dy = nextDy;
            previousSnake = JSON.parse(JSON.stringify(snake));
            snake.unshift(head); 

            // Apple Collision Trigger
            let ateAppleIndex = -1;
            for (let i = 0; i < apples.length; i++) {
                if (head.x === apples[i].x && head.y === apples[i].y) {
                    ateAppleIndex = i;
                    break;
                }
            }

            if (ateAppleIndex !== -1) {
                // Play eating sound overlapping multiple times
                let eatClone = eatSound.cloneNode(true);
                eatClone.play().catch(e => console.log("Audio play prevented:", e));

                score++;
                
                const applesVal = applesSelect.value;
                const key = `snakeHighScore_${speedSelect.value}_${mapSelect.value}_${applesVal}_${currentGamemode}`;
                let currentHigh = localStorage.getItem(key) || 0;
                
                if (score > currentHigh) {
                    localStorage.setItem(key, score);
                }
                updateScoreDisplay();
                
                apples.splice(ateAppleIndex, 1);

                // --- WIN CONDITION CHECK ---
                if (snake.length >= COLS * ROWS) {
                    renderStaticFrame(); 
                    triggerWin();
                    return;
                }

                // Normal Mode: Replace eaten apple if there's free space
                // AllApples Mode: Do NOT replace the apple, board just empties out
                if (currentGamemode === 'Normal') {
                    let newApple = createApple(false);
                    if (newApple) {
                        apples.push(newApple);
                    }
                }
            } else {
                snake.pop();
            }
        }

        // --- Confetti Generation System ---
        function triggerWin() {
            // Play win sound
            winSound.currentTime = 0;
            winSound.play().catch(e => console.log("Audio play prevented:", e));

            winScreen.style.display = 'flex';
            const confettiCanvas = document.getElementById('confettiCanvas');
            confettiCanvas.style.display = 'block';
            
            initConfetti();
            renderConfetti();
        }

        function initConfetti() {
            const confettiCanvas = document.getElementById('confettiCanvas');
            confettiCanvas.width = confettiCanvas.offsetWidth;
            confettiCanvas.height = confettiCanvas.offsetHeight;
            confetti =[];
            const colors =['#a864fd', '#29cdff', '#78ff44', '#ff718d', '#fdff6a'];
            
            for (let i = 0; i < 150; i++) {
                confetti.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height, 
                    w: Math.random() * 8 + 4,
                    h: Math.random() * 10 + 5,
                    dx: Math.random() * 3 - 1.5,
                    dy: Math.random() * 3 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05,
                    tiltAngle: 0
                });
            }
        }

        function renderConfetti() {
            const confettiCanvas = document.getElementById('confettiCanvas');
            const ctxC = confettiCanvas.getContext('2d');
            ctxC.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            confetti.forEach(c => {
                c.tiltAngle += c.tiltAngleInc;
                c.y += c.dy;
                c.x += Math.sin(c.tiltAngle) * 1.5 + c.dx;
                
                if (c.y > confettiCanvas.height) {
                    c.y = -20;
                    c.x = Math.random() * confettiCanvas.width;
                }

                ctxC.beginPath();
                ctxC.lineWidth = c.w;
                ctxC.strokeStyle = c.color;
                ctxC.moveTo(c.x + c.tilt + c.w / 2, c.y);
                ctxC.lineTo(c.x + c.tilt, c.y + c.tilt + c.h);
                ctxC.stroke();
            });

            if (winScreen.style.display === 'flex') {
                confettiAnimationFrame = requestAnimationFrame(renderConfetti);
            }
        }

        // --- Render Operations ---
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function drawGrid() {
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 1;

            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * TILE_SIZE, 0);
                ctx.lineTo(x * TILE_SIZE, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * TILE_SIZE);
                ctx.lineTo(canvas.width, y * TILE_SIZE);
                ctx.stroke();
            }
        }

        function drawSnakeStatic() {
            if (snake.length === 0) return;
            drawSnakePath(snake, snake, 1.0);
        }

        function drawSnakeInterpolated(progress) {
            if (snake.length === 0) return;
            drawSnakePath(previousSnake, snake, progress);
        }

        function drawSnakePath(prev, curr, progress) {
            let vertices =[];
            let last = curr.length - 1;
            let prevLast = prev.length - 1;
            
            let tdx = curr[last].x - prev[prevLast].x;
            let tdy = curr[last].y - prev[prevLast].y;
            let tx = prev[prevLast].x + tdx * progress;
            let ty = prev[prevLast].y + tdy * progress;
            
            vertices.push({ x: tx, y: ty });

            for (let i = last; i >= 1; i--) {
                vertices.push({ x: curr[i].x, y: curr[i].y });
            }

            let hdx = curr[0].x - curr[1].x;
            let hdy = curr[0].y - curr[1].y;
            let hx = curr[1].x + hdx * progress;
            let hy = curr[1].y + hdy * progress;
            
            vertices.push({ x: hx, y: hy });

            ctx.beginPath();
            ctx.moveTo((vertices[0].x + 0.5) * TILE_SIZE, (vertices[0].y + 0.5) * TILE_SIZE);
            for (let i = 1; i < vertices.length; i++) {
                ctx.lineTo((vertices[i].x + 0.5) * TILE_SIZE, (vertices[i].y + 0.5) * TILE_SIZE);
            }
            
            ctx.strokeStyle = '#81C784'; 
            ctx.lineWidth = TILE_SIZE * 0.8; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc((hx + 0.5) * TILE_SIZE, (hy + 0.5) * TILE_SIZE, (TILE_SIZE * 0.8) / 2, 0, Math.PI * 2);
            ctx.fillStyle = '#4CAF50'; 
            ctx.fill();
        }

        function renderStaticFrame() {
            clearCanvas();
            drawGrid();
            drawApples();
            drawSnakeStatic();
        }

        function createApple(isFirst = false) {
            if (isFirst) {
                let newApple = { x: snake[0].x + 3, y: snake[0].y };
                if (newApple.x >= COLS) newApple.x = COLS - 1;
                
                let onSnake = snake.some(part => part.x === newApple.x && part.y === newApple.y);
                let onApple = apples.some(a => a.x === newApple.x && a.y === newApple.y);
                if (!onSnake && !onApple) return newApple;
            }

            let freeSpots =[];
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    let onSnake = snake.some(part => part.x === x && part.y === y);
                    let onApple = apples.some(a => a.x === x && a.y === y);
                    
                    if (!onSnake && !onApple) {
                        freeSpots.push({ x: x, y: y });
                    }
                }
            }

            if (freeSpots.length === 0) return null; 

            return freeSpots[Math.floor(Math.random() * freeSpots.length)];
        }

        function drawApples() {
            apples.forEach(apple => {
                if (appleImg.complete && appleImg.naturalWidth !== 0) {
                    ctx.drawImage(appleImg, apple.x * TILE_SIZE, apple.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                } else {
                    ctx.beginPath();
                    ctx.arc((apple.x + 0.5) * TILE_SIZE, (apple.y + 0.5) * TILE_SIZE, (TILE_SIZE * 0.7) / 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff4c4c';
                    ctx.fill();
                }
            });
        }

        // --- Event Listeners ---

        document.addEventListener('keydown', function(event) {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.code)) {
                event.preventDefault(); 
            }

            // ESC toggles pause during gameplay
            if (event.code === 'Escape') {
                const isPlaying = startScreen.style.display !== 'flex' &&
                                  settingsScreen.style.display !== 'flex' &&
                                  gamemodesScreen.style.display !== 'flex' &&
                                  gameOverScreen.style.display !== 'flex' &&
                                  winScreen.style.display !== 'flex';
                if (isPlaying) {
                    if (isPaused) {
                        resumeGame();
                    } else {
                        pauseGame();
                    }
                    return;
                }
            }

            if (gameOverScreen.style.display === 'flex' || startScreen.style.display === 'flex' || settingsScreen.style.display === 'flex' || gamemodesScreen.style.display === 'flex' || winScreen.style.display === 'flex' || isPaused) {
                return;
            }
            
            const keyPressed = event.keyCode;
            let currentDx, currentDy;
            
            if (directionQueue.length > 0) {
                const lastMove = directionQueue[directionQueue.length - 1];
                currentDx = lastMove.dx;
                currentDy = lastMove.dy;
            } else {
                currentDx = snake[0].x - snake[1].x;
                currentDy = snake[0].y - snake[1].y;
            }

            let newDx = 0;
            let newDy = 0;
            let valid = false;

            if ((keyPressed === 37 || keyPressed === 65) && currentDx !== 1) {
                newDx = -1; newDy = 0; valid = true;
            } else if ((keyPressed === 38 || keyPressed === 87) && currentDy !== 1) {
                newDx = 0; newDy = -1; valid = true;
            } else if ((keyPressed === 39 || keyPressed === 68) && currentDx !== -1) {
                newDx = 1; newDy = 0; valid = true;
            } else if ((keyPressed === 40 || keyPressed === 83) && currentDy !== -1) {
                newDx = 0; newDy = 1; valid = true;
            }
            
            if (valid) {
                const isStationary = (dx === 0 && dy === 0 && directionQueue.length === 0);
                
                if (isStationary || currentDx !== newDx || currentDy !== newDy) {
                    if (directionQueue.length < 3) {
                        directionQueue.push({ dx: newDx, dy: newDy });
                        
                        // Play movement sound overlapping
                        let moveClone = moveSound.cloneNode(true);
                        moveClone.play().catch(e => console.log("Audio play prevented:", e));
                    }
                }

                if (isStationary) {
                    lastTickTime = performance.now();
                    updateLogic();
                }
            }
        });

        // Interface Button Interactivity
        startBtn.addEventListener('click', initPlay);
        restartBtn.addEventListener('click', initPlay);
        winRestartBtn.addEventListener('click', initPlay);

        // Menus Navigation
        settingsBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            settingsScreen.style.display = 'flex';
        });

        settingsBackBtn.addEventListener('click', () => {
            settingsScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            prepareBoard(false);
        });

        gamemodesBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            gamemodesScreen.style.display = 'flex';
        });

        gamemodesBackBtn.addEventListener('click', () => {
            gamemodesScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            prepareBoard(false);
        });

        // Gamemode Selection Logic
        gamemodeRows.forEach(row => {
            row.addEventListener('click', () => {
                // Remove active class from all
                gamemodeRows.forEach(r => r.classList.remove('active'));
                // Add active to clicked row
                row.classList.add('active');
                // Set the current mode
                currentGamemode = row.getAttribute('data-mode');
            });
        });

        const resetToMainMenu = () => {
            isPaused = false;
            gameOverScreen.style.display = 'none';
            winScreen.style.display = 'none';
            pauseScreen.style.display = 'none';
            document.getElementById('confettiCanvas').style.display = 'none';
            startScreen.style.display = 'flex';
            prepareBoard(false);
        };

        mainMenuBtn.addEventListener('click', resetToMainMenu);
        winMainMenuBtn.addEventListener('click', resetToMainMenu);
        resumeBtn.addEventListener('click', resumeGame);
        pauseMainMenuBtn.addEventListener('click', resetToMainMenu);

        prepareBoard(false);

        // ================================================================
        // MOBILE TOUCH / SWIPE SUPPORT
        // ================================================================

        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        const SWIPE_MIN_DIST = 20;   // px – minimum drag to count as a swipe
        const TAP_MAX_DIST   = 12;   // px – max movement to still count as a tap
        const TAP_MAX_MS     = 250;  // ms – max duration to count as a tap

        // We attach to the whole game-container so swipes anywhere on the
        // canvas area work, but taps on buttons still pass through normally.
        const canvasWrapper = document.getElementById('canvas-wrapper');

        canvasWrapper.addEventListener('touchstart', (e) => {
            const t = e.changedTouches[0];
            touchStartX    = t.clientX;
            touchStartY    = t.clientY;
            touchStartTime = performance.now();
            // Prevent scroll/zoom while playing
            e.preventDefault();
        }, { passive: false });

        canvasWrapper.addEventListener('touchend', (e) => {
            const t = e.changedTouches[0];
            const swipeDx = t.clientX - touchStartX;
            const swipeDy = t.clientY - touchStartY;
            const dist = Math.sqrt(swipeDx * swipeDx + swipeDy * swipeDy);
            const elapsed = performance.now() - touchStartTime;

            e.preventDefault();

            // Only process swipes during active gameplay
            if (!isGameplayActive() || isPaused) return;

            if (dist < TAP_MAX_DIST && elapsed < TAP_MAX_MS) {
                // Short tap on canvas = pause toggle
                if (isPaused) resumeGame(); else pauseGame();
                return;
            }

            if (dist < SWIPE_MIN_DIST) return; // too short, ignore

            // Determine dominant swipe axis
            let newDx = 0, newDy = 0;
            if (Math.abs(swipeDx) >= Math.abs(swipeDy)) {
                newDx = swipeDx > 0 ? 1 : -1;
            } else {
                newDy = swipeDy > 0 ? 1 : -1;
            }

            // Prevent reversing into self
            let currentDx, currentDy;
            if (directionQueue.length > 0) {
                const last = directionQueue[directionQueue.length - 1];
                currentDx = last.dx; currentDy = last.dy;
            } else if (snake.length >= 2) {
                currentDx = snake[0].x - snake[1].x;
                currentDy = snake[0].y - snake[1].y;
            } else {
                currentDx = dx; currentDy = dy;
            }

            const reversal = (newDx !== 0 && newDx === -currentDx) ||
                             (newDy !== 0 && newDy === -currentDy);
            if (reversal) return;

            const isStationary = (dx === 0 && dy === 0 && directionQueue.length === 0);

            if (isStationary || currentDx !== newDx || currentDy !== newDy) {
                if (directionQueue.length < 3) {
                    directionQueue.push({ dx: newDx, dy: newDy });
                    let mc = moveSound.cloneNode(true);
                    mc.play().catch(() => {});
                }
            }
            if (isStationary) {
                lastTickTime = performance.now();
                updateLogic();
            }
        }, { passive: false });

        // Prevent context menu on long press over canvas
        canvasWrapper.addEventListener('contextmenu', e => e.preventDefault());

        // ================================================================
        // END MOBILE TOUCH SUPPORT
        // ================================================================

        // ================================================================
        // GAMEPAD / CONTROLLER SUPPORT
        // ================================================================

        const cursorEl    = document.getElementById('controller-cursor');
        const badgeEl     = document.getElementById('controller-badge');
        const gameContainer = document.getElementById('game-container');

        // Cursor position (relative to game-container)
        let cursorPos = { x: 0, y: 0 };

        // Gamepad state tracking
        let gpLastButtons = {};        // { buttonIndex: bool }
        let gpStickTriggered = false;  // debounce: has the stick already fired this push?
        let gpStickInNeutral = true;   // was stick in neutral last frame?

        const STICK_DEAD   = 0.25;   // ignore below this magnitude
        const STICK_THRESH = 0.55;   // register direction above this
        const CURSOR_SPD   = 8;      // px per frame the cursor moves

        // ---- helpers ----

        function initCursor() {
            cursorPos.x = gameContainer.offsetWidth  / 2;
            cursorPos.y = gameContainer.offsetHeight / 2;
            applyCursorPos();
        }

        function applyCursorPos() {
            cursorEl.style.left = cursorPos.x + 'px';
            cursorEl.style.top  = cursorPos.y + 'px';
        }

        function isOnMenuScreen() {
            return startScreen.style.display    === 'flex' ||
                   settingsScreen.style.display  === 'flex' ||
                   gamemodesScreen.style.display === 'flex' ||
                   gameOverScreen.style.display  === 'flex' ||
                   winScreen.style.display       === 'flex';
        }

        function isGameplayActive() {
            return !isOnMenuScreen() &&
                   gameOverScreen.style.display  !== 'flex' &&
                   winScreen.style.display       !== 'flex' &&
                   pauseScreen.style.display     !== 'flex';
        }

        function btnJustPressed(gp, idx) {
            const now = !!(gp.buttons[idx] && gp.buttons[idx].pressed);
            const was = !!gpLastButtons[idx];
            return now && !was;
        }

        // ---- main poll loop ----

        function pollGamepad() {
            requestAnimationFrame(pollGamepad);

            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            let gp = null;
            for (let i = 0; i < gamepads.length; i++) {
                if (gamepads[i]) { gp = gamepads[i]; break; }
            }
            if (!gp) return;

            const cw = gameContainer.offsetWidth;
            const ch = gameContainer.offsetHeight;

            // Raw axes (left stick)
            const rawX = gp.axes[0] || 0;
            const rawY = gp.axes[1] || 0;
            // Axis values after dead-zone
            const axX = Math.abs(rawX) > STICK_DEAD ? rawX : 0;
            const axY = Math.abs(rawY) > STICK_DEAD ? rawY : 0;

            // ──────────────────────────────────────────────────────
            // MENU MODE — move the cursor, A to click, B to go back
            // ──────────────────────────────────────────────────────
            if (isOnMenuScreen()) {
                cursorEl.style.display = 'block';

                // Move cursor with left stick
                cursorPos.x = Math.max(0, Math.min(cw, cursorPos.x + axX * CURSOR_SPD));
                cursorPos.y = Math.max(0, Math.min(ch, cursorPos.y + axY * CURSOR_SPD));
                applyCursorPos();

                // A button (0) → click whatever is under the cursor
                if (btnJustPressed(gp, 0)) {
                    const rect = gameContainer.getBoundingClientRect();
                    const el = document.elementFromPoint(
                        rect.left + cursorPos.x,
                        rect.top  + cursorPos.y
                    );
                    if (el) el.click();
                }

                // B button (1) → back
                if (btnJustPressed(gp, 1)) {
                    if (settingsScreen.style.display === 'flex')  settingsBackBtn.click();
                    else if (gamemodesScreen.style.display === 'flex') gamemodesBackBtn.click();
                }

            } else {
                cursorEl.style.display = 'none';
            }

            // ──────────────────────────────────────────────────────
            // GAMEPLAY — snake direction via D-pad or left stick
            // ──────────────────────────────────────────────────────
            if (isGameplayActive() && !isPaused) {

                // D-pad (standard mapping: 12=up 13=down 14=left 15=right)
                const dUp    = btnJustPressed(gp, 12);
                const dDown  = btnJustPressed(gp, 13);
                const dLeft  = btnJustPressed(gp, 14);
                const dRight = btnJustPressed(gp, 15);

                // Left stick – fire once per tilt, then wait for neutral
                let sUp = false, sDown = false, sLeft = false, sRight = false;
                const mag = Math.sqrt(rawX * rawX + rawY * rawY);

                if (mag < STICK_DEAD) {
                    gpStickInNeutral = true;
                } else if (gpStickInNeutral && mag >= STICK_THRESH) {
                    gpStickInNeutral = false;
                    // dominant axis decides direction
                    if (Math.abs(rawX) >= Math.abs(rawY)) {
                        if (rawX > 0) sRight = true; else sLeft = true;
                    } else {
                        if (rawY > 0) sDown = true; else sUp = true;
                    }
                }

                // Determine current effective direction
                let currentDx, currentDy;
                if (directionQueue.length > 0) {
                    const last = directionQueue[directionQueue.length - 1];
                    currentDx = last.dx; currentDy = last.dy;
                } else if (snake.length >= 2) {
                    currentDx = snake[0].x - snake[1].x;
                    currentDy = snake[0].y - snake[1].y;
                } else {
                    currentDx = dx; currentDy = dy;
                }

                let newDx = 0, newDy = 0, valid = false;

                if      ((dLeft  || sLeft)  && currentDx !== 1)  { newDx = -1; newDy =  0; valid = true; }
                else if ((dRight || sRight) && currentDx !== -1) { newDx =  1; newDy =  0; valid = true; }
                else if ((dUp    || sUp)    && currentDy !== 1)  { newDx =  0; newDy = -1; valid = true; }
                else if ((dDown  || sDown)  && currentDy !== -1) { newDx =  0; newDy =  1; valid = true; }

                if (valid) {
                    const isStationary = (dx === 0 && dy === 0 && directionQueue.length === 0);
                    if (isStationary || currentDx !== newDx || currentDy !== newDy) {
                        if (directionQueue.length < 3) {
                            directionQueue.push({ dx: newDx, dy: newDy });
                            let mc = moveSound.cloneNode(true);
                            mc.play().catch(() => {});
                        }
                    }
                    if (isStationary) {
                        lastTickTime = performance.now();
                        updateLogic();
                    }
                }
            }

            // ──────────────────────────────────────────────────────
            // PAUSE  (Start / Options = buttons 9 / 8, X = button 2)
            // ──────────────────────────────────────────────────────
            if (btnJustPressed(gp, 9) || btnJustPressed(gp, 8) || btnJustPressed(gp, 2)) {
                if (isGameplayActive()) {
                    pauseGame();
                } else if (pauseScreen.style.display === 'flex') {
                    resumeGame();
                }
            }

            // A on pause → resume
            if (pauseScreen.style.display === 'flex' && btnJustPressed(gp, 0)) {
                resumeGame();
            }

            // Snapshot buttons for next frame
            const snap = {};
            gp.buttons.forEach((b, i) => { snap[i] = b.pressed; });
            gpLastButtons = snap;
        }

        // ── Connect / disconnect events ──
        window.addEventListener('gamepadconnected', (e) => {
            console.log('🎮 Gamepad connected:', e.gamepad.id);
            gpLastButtons   = {};
            gpStickInNeutral = true;
            badgeEl.classList.add('visible');
        });

        window.addEventListener('gamepaddisconnected', () => {
            badgeEl.classList.remove('visible');
            cursorEl.style.display = 'none';
        });

        // Place cursor at center on load / resize
        initCursor();
        window.addEventListener('resize', initCursor);

        // Kick off the poll loop
        pollGamepad();

        // ================================================================
        // END GAMEPAD SUPPORT
        // ================================================================

    </script>
</body>
</html>
